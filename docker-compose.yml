services:
  web-panel:
    build: ./web-panel
    ports:
      - "5000:5000"
    user: "${UID}:${GID}"
    volumes:
      - ./web-panel/setlist.json:/app/setlist.json:ro
      - "${GUIDES_PATH}:/app/guides:ro"
      - "/run/user/${UID}/pulse/native:/run/user/${UID}/pulse/native"
    environment:
      - REAPER_HOST=host.docker.internal
      - REAPER_PORT=9000
      - PULSE_SERVER=unix:/run/user/${UID}/pulse/native
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
